name: Product Catalog

on:
  schedule:
    # Weekly, every Friday, 17:00 UTC — see DECISIONS.md §11.
    #
    # This deliberately DEVIATES from the twice-monthly (1st/15th) cadence
    # documented in 01-mvp-scope.md, 04-etl-pipeline-design.md,
    # 05-raw-archive-strategy.md, 06-github-repository-structure.md, and
    # 07-github-actions-logic.md. Those docs have NOT been updated to match
    # this change yet — treat their "twice per month" language as stale
    # for this one specific point until they are.
    #
    # cron day-of-week: 5 = Friday (0=Sunday ... 6=Saturday).
    # 17:00 UTC chosen to match the daily price guide workflow's timing
    # convention (see daily-price-guide.yml) — same "run comfortably after
    # Cardmarket's data refresh" reasoning, not a precision requirement.
    - cron: '0 17 * * 5'
  workflow_dispatch: {}  # allows manual runs from the Actions tab

jobs:
  download-product-catalogs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run product catalog download
        env:
          PIPELINE_TIMEZONE: Europe/Vienna
          CARDMARKET_PRODUCTS_SINGLES_URL: https://downloads.s3.cardmarket.com/productCatalog/productList/products_singles_6.json
          CARDMARKET_PRODUCTS_NONSINGLES_URL: https://downloads.s3.cardmarket.com/productCatalog/productList/products_nonsingles_6.json
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          # Optional — see DECISIONS.md §10. If either secret is unset,
          # notify_telegram() skips silently rather than failing the run.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.ingestion.download_product_catalogs
